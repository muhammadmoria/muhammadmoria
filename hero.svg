<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0820"/>
      <stop offset="50%" stop-color="#1b1740"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <radialGradient id="auroraPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b2ff7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5D4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00F5D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5D4" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#00F5D4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00F5D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreHot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F5D4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00F5D4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00F5D4" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="blurCore" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <g>
    <ellipse cx="150" cy="60" rx="240" ry="150" fill="url(#auroraPurple)" filter="url(#blurSoft)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 25,15; 0,0" dur="14s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1080" cy="290" rx="260" ry="150" fill="url(#auroraTeal)" filter="url(#blurSoft)">
      <animateTransform attributeName="transform" type="translate" values="0,0; -20,-15; 0,0" dur="16s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g stroke="#00F5D4" stroke-width="1" opacity="0.10">
    <path d="M0,320 L900,50"/>
    <path d="M100,320 L910,60"/>
    <path d="M220,320 L920,70"/>
    <path d="M360,320 L925,80"/>
    <path d="M520,320 L930,88"/>
    <path d="M700,320 L935,90"/>
    <path d="M880,320 L940,88"/>
    <path d="M1040,320 L945,80"/>
    <path d="M1200,320 L950,60"/>
  </g>
  <g stroke="#00F5D4" stroke-width="1" opacity="0.09">
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="60" y1="275" x2="1150" y2="275"/>
    <line x1="140" y1="235" x2="1080" y2="235"/>
    <line x1="240" y1="200" x2="1000" y2="200"/>
  </g>

  <g stroke="#FFD700" stroke-width="2" opacity="0.55">
    <path d="M20,20 L20,50 M20,20 L50,20" fill="none"/>
    <path d="M1180,20 L1180,50 M1180,20 L1150,20" fill="none"/>
    <path d="M20,300 L20,270 M20,300 L50,300" fill="none"/>
    <path d="M1180,300 L1180,270 M1180,300 L1150,300" fill="none"/>
  </g>

  <g transform="rotate(-12 930 160)">
    <ellipse cx="930" cy="160" rx="150" ry="52" fill="none" stroke="#00F5D4" stroke-width="1" opacity="0.4"/>
    <circle cx="930" cy="160" r="4" fill="#00F5D4">
      <animateMotion path="M 150,0 A 150,52 0 1,1 -150,0 A 150,52 0 1,1 150,0" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="rotate(16 930 160)">
    <ellipse cx="930" cy="160" rx="185" ry="68" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.3"/>
    <circle cx="930" cy="160" r="3.5" fill="#FFD700">
      <animateMotion path="M -185,0 A 185,68 0 1,0 185,0 A 185,68 0 1,0 -185,0" dur="13s" repeatCount="indefinite"/>
    </circle>
  </g>

  <circle cx="930" cy="160" r="60" fill="url(#coreGrad)" filter="url(#blurCore)"/>
  <circle cx="930" cy="160" r="26" fill="url(#coreHot)">
    <animate attributeName="r" values="24;30;24" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <g fill="#ffffff">
    <circle cx="80" cy="90" r="1.6" opacity="0.6"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="40" r="1.2" opacity="0.5"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="410" cy="120" r="1.8" opacity="0.7"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="55" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="230" r="1.5" opacity="0.6"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="260" r="1.4" opacity="0.5"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="150" r="1.7" opacity="0.6"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="1160" cy="240" r="1.2" opacity="0.4"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="260" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="200" r="1.6" opacity="0.6"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>

  <text x="70" y="168" font-family="Consolas, Menlo, monospace" font-size="52" font-weight="700" fill="#00F5D4" filter="url(#textGlow)">MUHAMMAD DAWOOD</text>
  <text x="72" y="204" font-family="Consolas, Menlo, monospace" font-size="19" letter-spacing="3" fill="#FFD700" opacity="0.9">AI / ML SYSTEMS ENGINEER</text>
  <text x="72" y="232" font-family="Consolas, Menlo, monospace" font-size="13" letter-spacing="1.5" fill="#c9d1d9" opacity="0.65">NLP  ·  COMPUTER VISION  ·  LLM SYSTEMS  ·  KARACHI, PK</text>

  <rect x="72" y="216" width="430" height="2" fill="url(#scanGrad)">
    <animateTransform attributeName="transform" type="translate" values="-430,0; 430,0; -430,0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
