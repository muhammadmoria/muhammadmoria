<svg viewBox="0 0 1200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24243e"/>
      <stop offset="50%" stop-color="#1b1740"/>
      <stop offset="100%" stop-color="#0a0820"/>
    </linearGradient>
    <radialGradient id="auroraTealF" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5D4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00F5D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGradF" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5D4" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#00F5D4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00F5D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurSoftF" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blurCoreF" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="textGlowF" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="160" fill="url(#bgGradF)"/>

  <ellipse cx="200" cy="130" rx="220" ry="100" fill="url(#auroraTealF)" filter="url(#blurSoftF)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 18,0; 0,0" dur="12s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1000" cy="30" rx="220" ry="100" fill="url(#auroraTealF)" filter="url(#blurSoftF)">
    <animateTransform attributeName="transform" type="translate" values="0,0; -18,0; 0,0" dur="15s" repeatCount="indefinite"/>
  </ellipse>

  <g transform="rotate(-10 600 80)">
    <ellipse cx="600" cy="80" rx="130" ry="34" fill="none" stroke="#00F5D4" stroke-width="1" opacity="0.35"/>
    <circle cx="600" cy="80" r="3" fill="#00F5D4">
      <animateMotion path="M 130,0 A 130,34 0 1,1 -130,0 A 130,34 0 1,1 130,0" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <circle cx="600" cy="80" r="34" fill="url(#coreGradF)" filter="url(#blurCoreF)"/>

  <g fill="#ffffff">
    <circle cx="150" cy="50" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="110" r="1.5" opacity="0.6"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="40" r="1.4" opacity="0.5"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="120" r="1.6" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.3s" repeatCount="indefinite"/></circle>
  </g>

  <text x="600" y="86" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="15" letter-spacing="2" fill="#00F5D4" filter="url(#textGlowF)">BUILDING THE FUTURE — ONE INTELLIGENT SYSTEM AT A TIME</text>
</svg>
